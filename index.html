<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA6 - WebGPU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #minimap-canvas { width: 200px; height: 200px; }
    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #minimap {
      position: fixed; bottom: 20px; left: 20px;
      width: 200px; height: 200px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; overflow: hidden;
      background: rgba(0,0,0,0.6);
    }
    #minimap canvas { border-radius: 50%; }
    #speed {
      position: fixed; bottom: 20px; right: 20px;
      color: #fff; font-size: 28px; font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #info {
      position: fixed; top: 20px; left: 20px;
      color: #fff; font-size: 14px;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      line-height: 1.6;
    }
    #vehicle-prompt {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 16px; background: rgba(0,0,0,0.7);
      padding: 8px 20px; border-radius: 6px;
      display: none;
    }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0a; display: flex; align-items: center;
      justify-content: center; flex-direction: column; z-index: 100;
      color: #fff;
    }
    #loading h1 { font-size: 72px; letter-spacing: 20px; margin-bottom: 30px; }
    #loading .subtitle { font-size: 18px; opacity: 0.6; letter-spacing: 8px; }
    #loading .bar { width: 300px; height: 3px; background: #333; margin-top: 40px; border-radius: 2px; }
    #loading .bar-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.3s; width: 0%; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 4px; height: 4px; background: rgba(255,255,255,0.5);
      border-radius: 50%; display: none;
    }
    /* Flight HUD */
    #flight-hud { display: none; }
    #flight-instruments {
      position: fixed; bottom: 20px; right: 20px;
      text-align: right; color: #0f0;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 8px rgba(0,255,0,0.5);
    }
    #flight-instruments .fi-label {
      font-size: 10px; opacity: 0.6; letter-spacing: 2px; margin-top: 6px;
    }
    #flight-instruments .fi-value {
      font-size: 22px; font-weight: bold; line-height: 1.1;
    }
    #flight-throttle-bar {
      position: fixed; bottom: 30px; left: 240px;
      width: 8px; height: 120px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,0,0.3);
    }
    #flight-throttle-fill {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, #0a0, #0f0);
    }
    #flight-throttle-label {
      position: fixed; bottom: 12px; left: 234px;
      color: #0f0; font-size: 10px; font-family: 'Courier New', monospace;
      letter-spacing: 1px; text-shadow: 0 0 8px rgba(0,255,0,0.5);
    }
    #flight-horizon {
      position: fixed; bottom: 60px; right: 175px;
      width: 110px; height: 110px; border-radius: 50%;
      overflow: hidden; border: 2px solid rgba(0,255,0,0.4);
      background: #000;
    }
    #flight-horizon-inner {
      width: 200%; height: 200%; position: absolute; left: -50%;
      background: linear-gradient(to bottom, #1a3a7a 50%, #6b4420 50%);
    }
    #flight-horizon-wings {
      position: absolute; top: 50%; left: 12%; right: 12%;
      height: 2px; background: #0f0; transform: translateY(-50%);
    }
    #flight-horizon-dot {
      position: absolute; top: 50%; left: 50%;
      width: 6px; height: 6px; background: #0f0; border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    #flight-stall {
      position: fixed; top: 38%; left: 50%; transform: translateX(-50%);
      color: #f00; font-size: 36px; font-weight: bold;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(255,0,0,0.8);
      display: none; animation: stall-blink 0.5s infinite;
    }
    @keyframes stall-blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    #flight-controls-hint {
      position: fixed; bottom: 160px; right: 20px;
      color: rgba(0,255,0,0.4); font-size: 10px;
      font-family: 'Courier New', monospace;
      text-align: right; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>GTA6</h1>
    <div class="subtitle">WEBGPU ONLINE</div>
    <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="info"></div>
    <div id="speed"></div>
    <div id="minimap"><canvas id="minimap-canvas" width="200" height="200"></canvas></div>
    <div id="vehicle-prompt">Press F to enter vehicle</div>
    <div id="crosshair"></div>
    <div id="flight-hud">
      <div id="flight-throttle-bar"><div id="flight-throttle-fill"></div></div>
      <div id="flight-throttle-label">THR</div>
      <div id="flight-instruments">
        <div class="fi-label">SPD KTS</div>
        <div class="fi-value" id="flight-speed">0</div>
        <div class="fi-label">ALT FT</div>
        <div class="fi-value" id="flight-alt">0</div>
        <div class="fi-label">HDG</div>
        <div class="fi-value" id="flight-hdg">000</div>
        <div class="fi-label">FLAPS</div>
        <div class="fi-value" id="flight-flaps">0%</div>
      </div>
      <div id="flight-horizon">
        <div id="flight-horizon-inner"></div>
        <div id="flight-horizon-wings"></div>
        <div id="flight-horizon-dot"></div>
      </div>
      <div id="flight-stall">STALL</div>
      <div id="flight-controls-hint">W/S THROTTLE<br>A/D AILERONS (ROLL)<br>L/R ARROWS RUDDER<br>U/D ARROWS FLAPS<br>SPACE NOSE UP<br>CTRL NOSE DOWN</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
