<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <title>GTA6 - WebGPU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #canvas { display: block; width: 100vw; height: 100vh; height: 100dvh; }
    #minimap-canvas { width: 200px; height: 200px; }
    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #minimap {
      position: fixed; bottom: 20px; left: 20px;
      width: 200px; height: 200px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; overflow: hidden;
      background: rgba(0,0,0,0.6);
    }
    #minimap canvas { border-radius: 50%; }
    #speed {
      position: fixed; bottom: 20px; right: 20px;
      color: #fff; font-size: 28px; font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #info {
      position: fixed; top: 20px; left: 20px;
      color: #fff; font-size: 14px;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      line-height: 1.6;
    }
    #vehicle-prompt {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 16px; background: rgba(0,0,0,0.7);
      padding: 8px 20px; border-radius: 6px;
      display: none;
    }

    /* ====== Loading Screen ====== */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100; overflow: hidden;
    }

    /* Gradient sky background */
    #loading-bg {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        #0a0c1a 0%,
        #1a1040 20%,
        #3a1855 40%,
        #c44a20 65%,
        #e8922a 78%,
        #f5c84a 90%,
        #ffeebb 100%
      );
    }

    /* Sun glow at horizon */
    #loading-sun {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8e0 0%, #f5c84a 30%, rgba(228,146,42,0) 70%);
      filter: blur(3px);
    }

    /* Reflection on water below city */
    #loading-water {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 18%;
      background: linear-gradient(
        to bottom,
        #1a1030 0%,
        #0f0820 50%,
        #080412 100%
      );
      opacity: 0.9;
    }
    #loading-water::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 100%;
      background: linear-gradient(to bottom,
        rgba(245,200,74,0.25) 0%,
        rgba(228,146,42,0.1) 40%,
        transparent 100%
      );
      filter: blur(8px);
    }

    /* City skyline silhouette via inline SVG */
    #loading-skyline {
      position: absolute;
      bottom: 17%;
      left: 0;
      width: 100%;
      height: 40%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #loading-skyline svg {
      width: 100%;
      max-width: 1200px;
      height: auto;
      display: block;
    }

    /* Stars twinkling */
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: star-twinkle 3s ease-in-out infinite alternate;
    }
    @keyframes star-twinkle {
      0% { opacity: 0.2; } 100% { opacity: 1; }
    }

    /* Title & UI */
    #loading-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #loading-title {
      font-size: clamp(60px, 12vw, 130px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: transparent;
      background: linear-gradient(to bottom, #fff 0%, #ffeebb 60%, #e8922a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(232,146,42,0.4));
      margin-bottom: 6px;
      line-height: 1;
    }

    #loading-subtitle {
      font-size: clamp(12px, 2vw, 18px);
      letter-spacing: 0.5em;
      color: rgba(255,238,187,0.6);
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    /* Progress bar */
    #loading-progress {
      width: min(350px, 60vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #loading-bar-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    #load-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #e8922a, #ffeebb);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    #loading-status {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(255,238,187,0.35);
      text-transform: uppercase;
    }

    /* Start button */
    #start-btn {
      display: none;
      align-items: center; justify-content: center;
      padding: 14px 50px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(232,146,42,0.2);
      border: 1px solid rgba(255,238,187,0.35);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      animation: start-pulse 2s ease-in-out infinite;
    }
    #start-btn:hover {
      background: rgba(232,146,42,0.4);
      border-color: rgba(255,238,187,0.6);
    }
    #start-btn:active { transform: scale(0.97); }
    @keyframes start-pulse {
      0%, 100% { border-color: rgba(255,238,187,0.25); }
      50% { border-color: rgba(255,238,187,0.55); }
    }

    /* Loading tips at bottom */
    #loading-tip {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 11;
      font-size: 13px;
      color: rgba(255,238,187,0.3);
      max-width: 500px;
      line-height: 1.5;
      animation: tip-fade 6s ease-in-out infinite;
    }
    @keyframes tip-fade {
      0%, 100% { opacity: 0; } 15%, 85% { opacity: 1; }
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 4px; height: 4px; background: rgba(255,255,255,0.5);
      border-radius: 50%; display: none;
    }
    /* Flight HUD */
    #flight-hud { display: none; }
    #flight-instruments {
      position: fixed; bottom: 20px; right: 20px;
      text-align: right; color: #0f0;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 8px rgba(0,255,0,0.5);
    }
    #flight-instruments .fi-label {
      font-size: 10px; opacity: 0.6; letter-spacing: 2px; margin-top: 6px;
    }
    #flight-instruments .fi-value {
      font-size: 22px; font-weight: bold; line-height: 1.1;
    }
    #flight-throttle-bar {
      position: fixed; bottom: 30px; left: 240px;
      width: 8px; height: 120px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,0,0.3);
    }
    #flight-throttle-fill {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, #0a0, #0f0);
    }
    #flight-throttle-label {
      position: fixed; bottom: 12px; left: 234px;
      color: #0f0; font-size: 10px; font-family: 'Courier New', monospace;
      letter-spacing: 1px; text-shadow: 0 0 8px rgba(0,255,0,0.5);
    }
    #flight-horizon {
      position: fixed; bottom: 60px; right: 175px;
      width: 110px; height: 110px; border-radius: 50%;
      overflow: hidden; border: 2px solid rgba(0,255,0,0.4);
      background: #000;
    }
    #flight-horizon-inner {
      width: 200%; height: 200%; position: absolute; left: -50%;
      background: linear-gradient(to bottom, #1a3a7a 50%, #6b4420 50%);
    }
    #flight-horizon-wings {
      position: absolute; top: 50%; left: 12%; right: 12%;
      height: 2px; background: #0f0; transform: translateY(-50%);
    }
    #flight-horizon-dot {
      position: absolute; top: 50%; left: 50%;
      width: 6px; height: 6px; background: #0f0; border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    #flight-stall {
      position: fixed; top: 38%; left: 50%; transform: translateX(-50%);
      color: #f00; font-size: 36px; font-weight: bold;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(255,0,0,0.8);
      display: none; animation: stall-blink 0.5s infinite;
    }
    @keyframes stall-blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    #flight-controls-hint {
      position: fixed; bottom: 160px; right: 20px;
      color: rgba(0,255,0,0.4); font-size: 10px;
      font-family: 'Courier New', monospace;
      text-align: right; line-height: 1.6;
    }

    /* ====== Mobile Touch Controls ====== */
    .touch-controls { display: none; }

    @media (pointer: coarse), (hover: none) {
      /* Shrink desktop HUD on mobile */
      #info { font-size: 11px; top: env(safe-area-inset-top, 10px); left: 10px; }
      #speed { font-size: 20px; bottom: auto; top: env(safe-area-inset-top, 10px); right: 10px; }
      #minimap { width: 120px; height: 120px; bottom: calc(10px + env(safe-area-inset-bottom, 0px)); left: calc(10px + env(safe-area-inset-left, 0px)); }
      #minimap-canvas { width: 120px; height: 120px; }
      #flight-instruments { font-size: 10px; bottom: 10px; right: 10px; }
      #flight-instruments .fi-value { font-size: 16px; }
      #flight-horizon { width: 70px; height: 70px; bottom: 40px; right: 110px; }
      #flight-throttle-bar { left: 145px; height: 80px; bottom: 20px; }
      #flight-throttle-label { left: 140px; bottom: 6px; }
      #flight-controls-hint { display: none; }
      #vehicle-prompt { display: none !important; }
    }

    /* Joystick */
    #joystick-base {
      display: none;
      position: fixed; z-index: 20; pointer-events: none;
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.15);
    }
    #joystick-thumb {
      position: absolute;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(255,255,255,0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Touch button base */
    .touch-btn {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .touch-btn:active, .touch-btn.active {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    .touch-btn-sm { width: 50px; height: 50px; font-size: 10px; }
    .touch-btn-md { width: 60px; height: 60px; }
    .touch-btn-lg { width: 70px; height: 70px; font-size: 13px; }

    /* Button groups */
    .touch-controls {
      position: fixed; z-index: 20; pointer-events: none;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      right: calc(15px + env(safe-area-inset-right, 0px));
      flex-direction: column; align-items: flex-end; gap: 10px;
    }
    .touch-row { display: flex; gap: 10px; align-items: center; }

    /* Action button (F / enter-exit) - always visible on mobile */
    #touch-action-btn {
      position: fixed; z-index: 21; pointer-events: auto;
      bottom: calc(140px + env(safe-area-inset-bottom, 0px));
      right: calc(20px + env(safe-area-inset-right, 0px));
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,180,0,0.25);
      border: 2px solid rgba(255,180,0,0.5);
      color: rgba(255,255,255,0.85);
      font-size: 18px; font-weight: 900;
      display: none;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #touch-action-btn:active { background: rgba(255,180,0,0.5); }

    /* Square buttons for flight */
    .touch-btn-rect {
      border-radius: 10px;
      width: auto; height: 44px;
      padding: 0 14px;
      font-size: 10px;
    }

    @media (pointer: coarse), (hover: none) {
      .touch-controls { display: flex; }
      #touch-action-btn { display: flex; }
    }

    /* Portrait warning */
    #portrait-warning {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: #0a0a0a;
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; text-align: center; gap: 20px;
    }
    #portrait-warning .rotate-icon {
      width: 60px; height: 60px; border: 3px solid rgba(255,255,255,0.5);
      border-radius: 8px; position: relative;
      animation: rotate-hint 2s ease-in-out infinite;
    }
    #portrait-warning .rotate-icon::after {
      content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5);
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); }
    }
    #portrait-warning p { font-size: 16px; opacity: 0.7; letter-spacing: 2px; }

    @media (pointer: coarse) and (orientation: portrait) {
      #portrait-warning { display: flex; }
    }
  </style>
</head>
<body>
  <div id="portrait-warning">
    <div class="rotate-icon"></div>
    <p>ROTATE YOUR DEVICE</p>
  </div>
  <div id="loading">
    <div id="loading-bg"></div>

    <!-- Stars -->
    <div id="loading-stars"></div>

    <!-- Sun glow -->
    <div id="loading-sun"></div>

    <!-- City skyline silhouette -->
    <div id="loading-skyline">
      <svg viewBox="0 0 1200 300" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Window lights pattern -->
          <pattern id="wins" x="0" y="0" width="6" height="8" patternUnits="userSpaceOnUse">
            <rect x="1" y="1" width="3" height="4" fill="#f5c84a" opacity="0.25"/>
          </pattern>
        </defs>
        <!-- Far buildings (darkest) -->
        <g fill="#0a0812" opacity="0.9">
          <rect x="80" y="120" width="40" height="180"/>
          <rect x="130" y="90" width="35" height="210"/>
          <rect x="175" y="140" width="50" height="160"/>
          <rect x="240" y="60" width="45" height="240"/>
          <rect x="295" y="100" width="30" height="200"/>
          <rect x="340" y="130" width="55" height="170"/>
          <!-- Tall downtown cluster -->
          <rect x="420" y="30" width="50" height="270"/>
          <rect x="460" y="50" width="40" height="250"/>
          <rect x="490" y="15" width="55" height="285"/>
          <rect x="535" y="45" width="45" height="255"/>
          <rect x="570" y="70" width="35" height="230"/>
          <rect x="600" y="25" width="48" height="275"/>
          <rect x="640" y="55" width="42" height="245"/>
          <rect x="675" y="40" width="50" height="260"/>
          <rect x="720" y="80" width="35" height="220"/>
          <!-- Right side -->
          <rect x="770" y="110" width="45" height="190"/>
          <rect x="830" y="85" width="38" height="215"/>
          <rect x="880" y="130" width="50" height="170"/>
          <rect x="945" y="100" width="35" height="200"/>
          <rect x="990" y="150" width="45" height="150"/>
          <rect x="1050" y="120" width="40" height="180"/>
          <rect x="1100" y="160" width="35" height="140"/>
        </g>
        <!-- Window lights on buildings -->
        <g fill="url(#wins)" opacity="0.5">
          <rect x="420" y="30" width="50" height="270"/>
          <rect x="490" y="15" width="55" height="285"/>
          <rect x="600" y="25" width="48" height="275"/>
          <rect x="675" y="40" width="50" height="260"/>
          <rect x="240" y="60" width="45" height="240"/>
          <rect x="830" y="85" width="38" height="215"/>
        </g>
        <!-- Antenna/spire details -->
        <g fill="#0a0812">
          <rect x="510" y="0" width="3" height="15"/>
          <rect x="618" y="10" width="3" height="15"/>
          <rect x="694" y="25" width="3" height="15"/>
          <rect x="255" y="45" width="3" height="15"/>
        </g>
        <!-- Crane silhouette (because it's always under construction) -->
        <g stroke="#0a0812" stroke-width="2" fill="none">
          <line x1="160" y1="140" x2="160" y2="90"/>
          <line x1="140" y1="92" x2="200" y2="92"/>
          <line x1="160" y1="92" x2="145" y2="105"/>
        </g>
        <!-- Palm trees on the edges -->
        <g fill="#0a0812">
          <!-- Left palm -->
          <rect x="30" y="230" width="4" height="70"/>
          <ellipse cx="20" cy="225" rx="18" ry="8" transform="rotate(-30,20,225)"/>
          <ellipse cx="40" cy="222" rx="16" ry="7" transform="rotate(25,40,222)"/>
          <ellipse cx="30" cy="218" rx="17" ry="7" transform="rotate(-5,30,218)"/>
          <!-- Right palm -->
          <rect x="1155" y="240" width="4" height="60"/>
          <ellipse cx="1147" cy="235" rx="17" ry="7" transform="rotate(-25,1147,235)"/>
          <ellipse cx="1167" cy="232" rx="15" ry="7" transform="rotate(30,1167,232)"/>
          <ellipse cx="1157" cy="228" rx="16" ry="7" transform="rotate(5,1157,228)"/>
        </g>
      </svg>
    </div>

    <!-- Water reflection -->
    <div id="loading-water"></div>

    <!-- Title and progress -->
    <div id="loading-content">
      <div id="loading-title">GTA6</div>
      <div id="loading-subtitle">WebGPU Online</div>
      <div id="loading-progress">
        <div id="loading-bar-track"><div id="load-bar"></div></div>
        <div id="loading-status">Initializing</div>
      </div>
      <div id="start-btn">Play</div>
    </div>

    <!-- Loading tip -->
    <div id="loading-tip"></div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="info"></div>
    <div id="speed"></div>
    <div id="minimap"><canvas id="minimap-canvas" width="200" height="200"></canvas></div>
    <div id="vehicle-prompt">Press F to enter vehicle</div>
    <div id="crosshair"></div>
    <div id="flight-hud">
      <div id="flight-throttle-bar"><div id="flight-throttle-fill"></div></div>
      <div id="flight-throttle-label">THR</div>
      <div id="flight-instruments">
        <div class="fi-label">SPD KTS</div>
        <div class="fi-value" id="flight-speed">0</div>
        <div class="fi-label">ALT FT</div>
        <div class="fi-value" id="flight-alt">0</div>
        <div class="fi-label">HDG</div>
        <div class="fi-value" id="flight-hdg">000</div>
        <div class="fi-label">FLAPS</div>
        <div class="fi-value" id="flight-flaps">0%</div>
      </div>
      <div id="flight-horizon">
        <div id="flight-horizon-inner"></div>
        <div id="flight-horizon-wings"></div>
        <div id="flight-horizon-dot"></div>
      </div>
      <div id="flight-stall">STALL</div>
      <div id="flight-controls-hint">W/S THROTTLE<br>A/D AILERONS (ROLL)<br>L/R ARROWS RUDDER<br>U/D ARROWS FLAPS<br>SPACE NOSE UP<br>CTRL NOSE DOWN</div>
    </div>
  </div>

  <!-- Touch controls (mobile only, shown via CSS media query) -->
  <!-- Virtual joystick (drawn dynamically by input.ts) -->
  <div id="joystick-base"><div id="joystick-thumb"></div></div>

  <!-- Action button (F key - enter/exit vehicle) -->
  <div id="touch-action-btn"
    ontouchstart="window._touchBtn('action',true)" ontouchend="window._touchBtn('action',false)" ontouchcancel="window._touchBtn('action',false)">F</div>

  <!-- On-foot buttons -->
  <div id="touch-onfoot" class="touch-controls" style="display:none;">
    <div class="touch-row">
      <div class="touch-btn touch-btn-md"
        ontouchstart="window._touchBtn('punch',true)" ontouchend="window._touchBtn('punch',false)" ontouchcancel="window._touchBtn('punch',false)">HIT</div>
    </div>
    <div class="touch-row">
      <div class="touch-btn touch-btn-md"
        ontouchstart="window._touchBtn('sprint',true)" ontouchend="window._touchBtn('sprint',false)" ontouchcancel="window._touchBtn('sprint',false)">RUN</div>
    </div>
  </div>

  <!-- Vehicle (car/boat) buttons -->
  <div id="touch-vehicle" class="touch-controls" style="display:none;">
    <div class="touch-row">
      <div class="touch-btn touch-btn-md"
        ontouchstart="window._touchBtn('sprint',true)" ontouchend="window._touchBtn('sprint',false)" ontouchcancel="window._touchBtn('sprint',false)">NOS</div>
    </div>
    <div class="touch-row">
      <div class="touch-btn touch-btn-lg"
        ontouchstart="window._touchBtn('brake',true)" ontouchend="window._touchBtn('brake',false)" ontouchcancel="window._touchBtn('brake',false)">BRK</div>
    </div>
  </div>

  <!-- Flight buttons -->
  <div id="touch-flight" class="touch-controls" style="display:none;">
    <div class="touch-row">
      <div class="touch-btn touch-btn-sm"
        ontouchstart="window._touchBtn('flapsup',true)" ontouchend="window._touchBtn('flapsup',false)" ontouchcancel="window._touchBtn('flapsup',false)">FLP+</div>
      <div class="touch-btn touch-btn-sm"
        ontouchstart="window._touchBtn('flapsdown',true)" ontouchend="window._touchBtn('flapsdown',false)" ontouchcancel="window._touchBtn('flapsdown',false)">FLP-</div>
    </div>
    <div class="touch-row">
      <div class="touch-btn touch-btn-sm"
        ontouchstart="window._touchBtn('rudderleft',true)" ontouchend="window._touchBtn('rudderleft',false)" ontouchcancel="window._touchBtn('rudderleft',false)">RDR L</div>
      <div class="touch-btn touch-btn-sm"
        ontouchstart="window._touchBtn('rudderright',true)" ontouchend="window._touchBtn('rudderright',false)" ontouchcancel="window._touchBtn('rudderright',false)">RDR R</div>
    </div>
    <div class="touch-row">
      <div class="touch-btn touch-btn-md"
        ontouchstart="window._touchBtn('throttleup',true)" ontouchend="window._touchBtn('throttleup',false)" ontouchcancel="window._touchBtn('throttleup',false)">THR+</div>
      <div class="touch-btn touch-btn-md"
        ontouchstart="window._touchBtn('throttledown',true)" ontouchend="window._touchBtn('throttledown',false)" ontouchcancel="window._touchBtn('throttledown',false)">THR-</div>
    </div>
  </div>

  <script>
    // Generate stars
    (function() {
      const container = document.getElementById('loading-stars');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 35 + '%';
        star.style.animationDelay = (Math.random() * 3) + 's';
        star.style.animationDuration = (2 + Math.random() * 3) + 's';
        const size = 1 + Math.random() * 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        container.appendChild(star);
      }
    })();

    // Cycle loading tips
    (function() {
      const tips = [
        'WASD to move — Mouse to look — Shift to sprint',
        'Press F near a vehicle to hop in',
        'Boats can only travel on water — stay in the lake or river',
        'Fly north to find the mountain airport',
        'The diagonal boulevards cut through the city grid',
        'Left-click to punch nearby pedestrians. Sorry, not sorry.',
        'Cars have a handbrake on Space. Drift responsibly.',
        'Built with zero dependencies. Just TypeScript and WebGPU.',
        'No Shark Cards were harmed in the making of this game.',
        'Try landing a plane on the mountain runway. We dare you.',
      ];
      const el = document.getElementById('loading-tip');
      let idx = Math.floor(Math.random() * tips.length);
      el.textContent = tips[idx];
      setInterval(() => {
        idx = (idx + 1) % tips.length;
        el.textContent = tips[idx];
      }, 6000);
    })();

    // Loading status text updates
    window._setLoadingStatus = function(text) {
      const el = document.getElementById('loading-status');
      if (el) el.textContent = text;
    };
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
